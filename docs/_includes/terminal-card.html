<div class="hf-terminal" aria-hidden="true" role="presentation">
  <div class="hf-terminal__bar">
    <span class="hf-terminal__dot hf-terminal__dot--red"></span>
    <span class="hf-terminal__dot hf-terminal__dot--yellow"></span>
    <span class="hf-terminal__dot hf-terminal__dot--green"></span>
    <span class="hf-terminal__title">handoff</span>
  </div>
  <div class="hf-terminal__body">
    <div class="hf-terminal__line hf-terminal__line--cmd">
      <span class="hf-terminal__prompt">h&gt;</span>
      <span class="hf-terminal__cmd-text">/research attention is all you need</span>
    </div>
    <div class="hf-terminal__line">
      <span class="hf-terminal__val hf-terminal__val--muted">  searching OpenAlex + arXiv…</span>
    </div>
    <div class="hf-terminal__line">
      <span class="hf-terminal__val hf-terminal__val--on">  ✓ Vaswani et al. 2017 — direct match</span>
    </div>
    <div class="hf-terminal__line">
      <span class="hf-terminal__val hf-terminal__val--on">  ✓ 847 citing papers found</span>
    </div>
    <div class="hf-terminal__line">
      <span class="hf-terminal__val hf-terminal__val--accent">  claim: supported · added to ledger</span>
    </div>
    <hr class="hf-terminal__divider" />
    <div class="hf-terminal__line hf-terminal__line--cmd">
      <span class="hf-terminal__prompt">h&gt;</span>
      <span class="hf-terminal__cmd-text">/audit-paper</span>
    </div>
    <div class="hf-terminal__line">
      <span class="hf-terminal__key">supported</span>
      <span class="hf-terminal__val hf-terminal__val--on">12 claims</span>
    </div>
    <div class="hf-terminal__line">
      <span class="hf-terminal__key">weak</span>
      <span class="hf-terminal__val hf-terminal__val--amber">2 need citations</span>
    </div>
    <div class="hf-terminal__line">
      <span class="hf-terminal__key">model</span>
      <span class="hf-terminal__val">qwen3:8b · local</span>
      <span class="hf-terminal__status"></span>
    </div>
    <hr class="hf-terminal__divider" />
    <div class="hf-terminal__line hf-terminal__line--cmd">
      <span class="hf-terminal__prompt">h&gt;</span>
      <span class="hf-terminal__cursor"></span>
    </div>
  </div>
</div>
