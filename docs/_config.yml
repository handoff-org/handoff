# Jekyll config for the handoff documentation site (GitHub Pages).
#
# Deployed by GitHub Pages straight from this /docs folder — no build step on
# your side. After pushing, enable it under:
#   Settings → Pages → Source: "Deploy from a branch" → Branch: main → /docs
#
# NOTE: `baseurl` must match your repository name. This assumes the repo is
# named "handoff" (served at https://<user>.github.io/handoff/). If you push it
# under a different repo name, change `baseurl` to "/<that-name>".

title: handoff
description: >-
  Own your research. A local-first, terminal research companion that reads the
  literature, drafts and cites your paper, and helps run your experiments —
  powered by models running on your own machine.
url: 'https://handoff-org.github.io'
baseurl: '/handoff'

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

# Turn [links](getting-started.md) into working links to the built pages.
relative_links:
  enabled: true
  collections: false

# Files Jekyll should not copy into the built site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - product-audit.md
