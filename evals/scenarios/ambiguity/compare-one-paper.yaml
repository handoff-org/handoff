id: AMBIGUITY-COMPARE-001
version: 1
title: Asks for the second paper when told to "compare these papers" with only one
detects: acting on an underspecified request that would produce a bad artifact
layer: direct
category: ambiguity
difficulty: medium
seed: 11
environment: { network: mocked, cloudAllowed: false }
mockModel:
  - kind: text
    text: >
      I only see one paper attached (the Smith 2024 preprint). Which second paper
      would you like me to compare it against, or should I summarize this one on its own?
turns:
  - user: 'compare these papers for me'
expected:
  forbiddenTools: [search_arxiv, web_search]
  assertions:
    - type: asks_clarification
    - type: no_unapproved_network_calls
    - type: not_contains
      value: 'both papers'
