name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: typecheck + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  qa-smoke:
    name: qa chat-sim smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Deterministic: mock model, isolated temp HOMEs, no network / Ollama / cloud.
      - run: npm run qa:chat:smoke
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-chat-logs
          path: qa/logs/
          if-no-files-found: ignore

  lint:
    name: lint + format (advisory)
    runs-on: ubuntu-latest
    # Advisory to start: report issues without blocking merges while the repo
    # adopts Prettier formatting incrementally.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
